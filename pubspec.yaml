name: ugo_driver
description: UGo Smart Student Transport - Driver App
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: ^6.1.5+1
  dio: ^5.9.2
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  geolocator: ^14.0.2
  google_maps_flutter: ^2.16.0
  google_fonts: ^8.0.2
  go_router: ^17.1.0
  intl: ^0.20.2
  url_launcher: ^6.3.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # QR Scanner
  mobile_scanner: ^5.2.3

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
