name: ugo_driver
description: UGo Smart Student Transport - Driver App
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: ^6.1.5+1
  dio: ^5.9.2
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  geolocator: ^14.0.2
  google_maps_flutter: ^2.16.0
  flutter_google_places_sdk: ^0.4.3
  google_fonts: ^8.0.2
  go_router: ^17.1.0
  intl: ^0.20.2
  url_launcher: ^6.3.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # Image Picker
  image_picker: ^1.1.2

  # QR Scanner
  mobile_scanner: ^5.2.3

  # NFC
  nfc_manager: ^3.3.0

  # Offline QR
  connectivity_plus: ^6.1.4
  crypto: ^3.0.6

  # Icons
  cupertino_icons: ^1.0.8
  rename: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icon/logo.png"
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icon/
    - assets/icon/logo.png

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
